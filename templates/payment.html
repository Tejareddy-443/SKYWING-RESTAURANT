<!DOCTYPE html>
<html>
<head>
<title>SkyWing - Online Payment</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:rgb(216,212,132);
font-family:Arial;
margin:0;
}

/* Center Box */
.payment-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.payment-box{
background:white;
padding:40px;
width:420px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
}

.payment-box h2{
color:brown;
margin-bottom:20px;
}

.amount{
color:green;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.option-btn{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.upi{ background:orange; }
.qr{ background:#2ecc71; color:white; }
.card{ background:#3498db; color:white; }

.option-btn:hover{
opacity:0.85;
}

.qr-box{
margin-top:20px;
display:none;
}

.qr-box img{
width:200px;
height:200px;
}
</style>
</head>

<body>

<div class="payment-container">

<div class="payment-box">

<h2>Select Payment Method</h2>

<div class="amount">
Total Amount: ₹200
</div>

<button class="option-btn upi" onclick="showUPI()">
Pay via UPI
</button>

<button class="option-btn qr" onclick="showQR()">
Scan QR Code
</button>

<button class="option-btn card" onclick="window.location.href='card-payment.html'">
Pay via Card
</button>

<!-- UPI Section -->
<div id="upiSection" style="display:none; margin-top:20px;">
<p><b>UPI ID:</b> skywing@upi</p>
<button onclick="paymentSuccess()">I Have Paid</button>
</div>

<!-- QR Section -->
<div id="qrSection" class="qr-box">
<p>Scan this QR using any UPI App</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=skywing@upi&pn=SkyWing&am=200">
<br><br>
<button onclick="paymentSuccess()">I Have Paid</button>
</div>

</div>
</div>

<script>
function showUPI(){
document.getElementById("upiSection").style.display="block";
document.getElementById("qrSection").style.display="none";
}

function showQR(){
document.getElementById("qrSection").style.display="block";
document.getElementById("upiSection").style.display="none";
}

function paymentSuccess(){
alert("Payment Confirmed!");
window.location.href="success.html";
}
</script>

</body>
</html>
