<!DOCTYPE html>
<html>

<style>

    background-color: rgb(216,212,132);

.logo{
    display:flex;

nav ul{list-style:none;display:flex;}
nav ul li{margin-left:25px;}
nav ul li a{text-decoration:none;color:white;}
nav ul li a:hover{color:orange;}

.btn{
    background:orange;
    padding:8px 15px;

.gallery{
    text-align:center;

.gallery img{
    width:280px;

    border-radius:10px;

/* FOOTER */
footer{

    text-align:center;
