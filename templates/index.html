<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body style="background-color: blanchedalmond;">

    <h2 align="center" style="color:Blue;">Registration Form</h2>
<form action="/submit_registration" method="post" style="color:black;">
<table align="center" cellpadding="10" cellspacing="5" table border="1" style="background-color: azure;" width="50%" height="50%">
    <tr>
        <td>Name</td>
        <td><input type="text" name="name" placeholder="Enter Your Name here"> </td>
    </tr>
    <tr>
        <td>Email</td>
        <td><input type="email" name="email" placeholder="Enter Your Email here"> </td> 
    </tr>
    <tr>
        <td>Password</td>
        <td><input type="password" name="password" placeholder="Enter Your Password here"> </td>
    </tr>
    <tr>
        <td>Confirm Password</td>
        <td><input type="password" name="confirm_password" placeholder="Confirm Your Password here"> </td>
    </tr>
    <tr>
        <td colspan="2" align="center"><input type="submit" value="Register"></td>
    </tr>
</table>
</form>
</body>
</html>
